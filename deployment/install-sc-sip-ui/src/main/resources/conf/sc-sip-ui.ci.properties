# ============================================================================
# CI-Specific Configuration file for Project scadmin-web ()
#
# This file can be edit prior to any installation in dedicated env
# It must only contains parameter that are envionement dependent
# Common parameter must be store in Common configuration file
#
# Parameter defined in this file will be used for 2 usages :
#   1. Exported in Shell for script execution
#      Ex : export PROJECT_NAME=pricing
#   2. Used to susbtitute value in 'text' file located with /*_file/**/*
#      Note that variable in file must be framed with '%%'
#      Ex : replace %%PROJECT_NAME%% by 'pricing'
#
#   Note : Varaiable can reference other variable previously defined
#      Ex : PROJECT_HOME=/app/${PROJECT_NAME}
#
# ============================================================================

